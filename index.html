<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calian Nuclear — The lifecycle, engineered</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet" />
<style>
  :root {
    --blue: #003B71;
    --blue-deep: #002a52;
    --blue-soft: #14507f;
    --teal: #0574B9;
    --teal-soft: #e1eef7;
    --ink: #2E2E2E;
    --ink-soft: #5a5e63;
    --line: #e6e8ec;
    --line-soft: #f2f4f6;
    --paper: #ffffff;
    --paper-warm: #fafbfc;
    --grey-1: #67696c;
    --grey-2: #a6abb1;
    --tag-bg: var(--line-soft);
    --arc-track: #e1e5ea;
    --arc-track-outer: #cfd7df;
    --node-bg: var(--paper);
    --active-bg: #0574B9;
    --active-fg: #ffffff;
    --logo-filter: none;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  #root { min-height: 100vh; }

  /* shared chrome ----------------------------- */
  .stage {
    max-width: 1440px;
    margin: 0 auto;
    padding: 48px 64px 32px;
  }
  @media (max-width: 1100px) {
    .stage { padding: 36px 32px 24px; }
  }

  /* header */
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 32px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 24px;
  }
  .brand {
    display: flex; align-items: center; gap: 18px;
  }
  .brand-logo {
    height: 34px;
    width: auto;
    display: block;
    filter: var(--logo-filter, none);
    transition: filter .3s;
  }
  .brand-divider {
    width: 1px;
    height: 30px;
    background: var(--line);
  }
  .brand-bu {
    font-size: 13px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: -0.005em;
    line-height: 1.2;
  }
  .brand-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--grey-1);
    font-weight: 500;
    margin-top: 4px;
  }
  .topbar-right {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--grey-1);
    line-height: 1.6;
  }
  .topbar-right .key { color: var(--grey-2); }

  /* credentials — topbar variant (compact, right-aligned) */
  .topbar-creds {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: flex-end;
  }
  .topbar-creds-row {
    display: flex; gap: 10px; align-items: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-creds .stamp {
    font-size: 9px;
    letter-spacing: 0.20em;
    color: var(--grey-2);
    text-transform: uppercase;
    font-weight: 500;
  }
  .topbar-creds .badge {
    font-size: 12px;
    color: var(--blue);
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .topbar-creds .midot {
    width: 2.5px; height: 2.5px;
    border-radius: 999px;
    background: var(--grey-2);
  }
  .topbar-creds .blurb {
    font-size: 11.5px;
    color: var(--ink-soft);
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: 0;
    font-weight: 400;
    text-align: right;
  }

  /* credentials — rail variant (full-width strip between hero and viz) */
  .creds-rail {
    margin: 0;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }
  .creds-rail-cluster { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .creds-rail .stamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.20em;
    color: var(--grey-1);
    text-transform: uppercase;
    font-weight: 500;
    display: inline-flex; align-items: center;
  }
  .creds-rail .stamp::before {
    content: "";
    display: inline-block;
    width: 18px; height: 1px;
    background: var(--teal);
    margin-right: 12px;
  }
  .creds-rail .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.01em;
  }
  .creds-rail .midot { color: var(--grey-2); font-size: 11px; line-height: 1; }
  .creds-rail .blurb {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 500;
  }

  /* hero */
  .hero {
    padding: 56px 0 36px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    align-items: flex-start;
  }
  .hero h1 {
    font-size: clamp(44px, 5.2vw, 76px);
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.035em;
    margin: 0;
    color: var(--blue);
    max-width: 22ch;
    text-wrap: balance;
  }
  .hero h1 .dot {
    color: var(--teal);
  }
  .hero p.sub {
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 64ch;
    margin: 0;
    font-weight: 400;
    padding-left: 0;
    border-left: 0;
  }
  .hero p.sub strong { color: var(--ink); font-weight: 600; }

  /* topbar — contact links (replaces the old caption) */
  .topbar-contact {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
    font-size: 13px;
  }
  .topbar-contact a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
    letter-spacing: -0.005em;
    border-bottom: 1px solid transparent;
    transition: border-color .2s;
  }
  .topbar-contact a:hover { border-bottom-color: var(--teal); }
  .topbar-contact a:nth-child(2) { font-size: 12px; color: var(--ink-soft); font-weight: 400; }

  /* lifecycle ARC strip */
  .arc-wrap {
    position: relative;
    margin: 0;
    padding: 24px 0 0;
  }
  .arc-svg {
    width: 100%;
    height: 96px;
    display: block;
    overflow: visible;
  }
  .arc-nodes {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    margin-top: -56px;
    position: relative;
    z-index: 2;
  }
  .node {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    padding: 0 8px;
    user-select: none;
    text-align: center;
    position: relative;
  }
  .node-dot {
    width: 56px; height: 56px;
    border-radius: 999px;
    background: var(--node-bg);
    border: 1.5px solid var(--line);
    display: grid; place-items: center;
    transition: all .35s cubic-bezier(.2,.7,.2,1);
    position: relative;
    z-index: 1;
  }
  .node-dot::after {
    content: ""; position: absolute; inset: -6px;
    border-radius: 999px;
    border: 1px solid transparent;
    transition: all .35s;
  }
  .node-dot svg { width: 26px; height: 26px; color: var(--blue); transition: color .3s; }
  .node-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey-2);
    margin-top: 24px;
    letter-spacing: 0.12em;
    font-weight: 500;
  }
  .node-label {
    margin-top: 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    line-height: 1.25;
    max-width: 16ch;
    transition: color .3s;
  }
  .node:hover .node-dot {
    border-color: var(--blue);
  }
  .node:hover .node-label { color: var(--ink); }

  .node.active .node-dot {
    background: var(--active-bg);
    border-color: var(--active-bg);
    transform: scale(1.18);
  }
  .node.active .node-dot svg { color: var(--active-fg); }
  .node.active .node-dot::after {
    border-color: var(--teal);
    border-width: 1.5px;
    inset: -10px;
  }
  .node.active .node-num { color: var(--teal); }
  .node.active .node-label { color: var(--blue); }

  /* progress indicator on arc */
  .arc-progress-track,
  .arc-progress-fill { transition: stroke-dashoffset 0.6s cubic-bezier(.6,.2,.2,1); }

  /* DETAIL PANEL */
  .panel-wrap {
    margin-top: 40px;
    border-top: 1px solid var(--line);
    padding-top: 40px;
    min-height: 460px;
  }
  .panel {
    display: grid;
    grid-template-columns: 320px 1fr 1fr;
    gap: 48px;
    animation: fadeIn 0.45s ease both;
  }
  @media (max-width: 1100px) {
    .panel { grid-template-columns: 1fr; gap: 28px; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-meta { }
  .panel-step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--teal);
    letter-spacing: 0.18em;
    font-weight: 500;
    text-transform: uppercase;
  }
  .panel-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin: 14px 0 18px;
  }
  .panel-lead {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .panel-tags {
    margin-top: 24px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
    background: var(--tag-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 8px;
    letter-spacing: 0.02em;
  }

  /* outcomes column */
  .col-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--grey-1);
    margin: 0 0 18px;
    font-weight: 500;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .outcome-list { display: flex; flex-direction: column; gap: 20px; }
  .outcome {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    align-items: start;
  }
  .outcome-marker {
    margin-top: 8px;
    width: 18px; height: 1.5px;
    background: var(--teal);
  }
  .outcome-headline {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    letter-spacing: -0.005em;
  }
  .outcome-body {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
    line-height: 1.55;
  }

  /* proof column */
  .proof-list { display: flex; flex-direction: column; gap: 14px; }
  .proof {
    border-left: 2px solid var(--blue);
    padding: 4px 0 4px 16px;
  }
  .proof-where {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--teal);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .proof-what {
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.5;
  }

  /* footer ------------------------------------ */
  .footer {
    margin-top: 24px;
    padding: 28px 0 16px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .creds {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--grey-1);
    letter-spacing: 0.04em;
  }
  .creds-sep { color: var(--line); }
  .creds-line {
    color: var(--ink-soft);
    text-transform: none;
    letter-spacing: 0.02em;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 12px;
  }
  .creds .badge {
    color: var(--blue);
    font-weight: 600;
  }
  .contact {
    font-size: 13px;
    color: var(--ink-soft);
    display: flex; gap: 18px; align-items: center;
  }
  .contact a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .2s;
  }
  .contact a:hover { border-bottom-color: var(--teal); }

  /* hint */
  .hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--grey-2);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .hint kbd {
    background: var(--line-soft);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    color: var(--ink-soft);
    margin: 0 2px;
  }

  /* arrow controls */
  .nav-arrows {
    position: absolute;
    top: 8px; right: 0;
    display: flex; gap: 6px;
  }
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--paper);
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all .2s;
  }
  .nav-btn:hover {
    color: var(--blue);
    border-color: var(--blue);
  }
  .nav-btn:disabled {
    opacity: 0.35; cursor: not-allowed;
  }

  .arc-position { position: relative; }

  /* SHARED viz colors driven by CSS vars (SVG stroke property accepts var()) */
  .arc-track-outer { stroke: var(--arc-track-outer); }
  .arc-track-inner { stroke: var(--arc-track); }
  .arc-progress    { stroke: var(--blue); }
  .arc-tick        { fill: var(--teal); }

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">






const { useState, useEffect, useMemo, useRef } = React;

/* ------------------------------------------------------------------ */
/* ICONS — four sets the user can toggle between                     */
/* ------------------------------------------------------------------ */
const ARROWS = {
  ArrowL: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6" /></svg>,
  ArrowR: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
};

const ICON_SETS = {
  // ---- SET A: System states ----------------------------------------

    Refurb: () =>

    Decommissioning: () =>

        <path d="M 5 19 V 13 a 7 7 0 0 1 14 0 V 19" />

  // ---- ORIGINAL: the very first set -------------------------------
  origin: {
    label: 'Original',
    Siting: () =>
    <svg {...svgProps}>
        <circle cx="12" cy="12" r="8" />

/* SPINE strip — a straight line connecting the 5 nodes               */
/* ------------------------------------------------------------------ */
function SpineStrip({ activeIdx, count }) {
  const W = 1200,H = 90;
  const ptAt = (t) => ({ x: t * W, y: 64 });

  const path = (samples = 60) => {
    let d = '';
    for (let i = 0; i <= samples; i++) {
      const p = ptAt(i / samples);
      d += (i === 0 ? 'M ' : 'L ') + p.x.toFixed(2) + ' ' + p.y.toFixed(2) + ' ';
    }
    return d;
  };
  const pathD = useMemo(() => path(2), []);

  const nodeTs = Array.from({ length: count }, (_, i) => (i + 0.5) / count);
  const activeT = nodeTs[activeIdx];

  const pathRef = useRef(null);
  const [len, setLen] = useState(1000);
  useEffect(() => {
    if (pathRef.current) setLen(pathRef.current.getTotalLength());
  }, [pathD]);

  const tickPt = ptAt(activeT);

  return (
    <svg className="arc-svg" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" aria-hidden="true">
      <path ref={pathRef} className="arc-track-inner" d={pathD} fill="none" strokeWidth="2" strokeLinecap="round" />
      <path
        className="arc-progress"
        d={pathD}
        fill="none"
        strokeWidth="2"
        strokeLinecap="round"
        strokeDasharray={len}
        strokeDashoffset={len * (1 - activeT)}
        style={{ transition: 'stroke-dashoffset 0.7s cubic-bezier(.5,.1,.2,1)' }} />
      <circle className="arc-tick" cx={tickPt.x} cy={tickPt.y} r="3.5" />
    </svg>);

}

      {/* ---------- HERO ---------- */}
      <div className="hero">
        <h1>
          Supporting Canada’s nuclear fleet: from first licence through final decommissioning<span className="dot">.</span>
        </h1>
        <p className="sub">
          Five phases. One operating partner. <strong>Calian</strong> works alongside utilities, vendors, regulators and government bodies across the full lifecycle of a nuclear facility, with over 25 years of work that has stood up to scrutiny.

      {/* ---------- VIZ + PANEL ---------- */}
      <div className="viz-wrap">
        {/* ---------- LIFECYCLE strip ---------- */}
        <div className="arc-wrap arc-position" data-screen-label="Lifecycle">
          <div className="nav-arrows">
            <button className="nav-btn" aria-label="Previous phase" onClick={() => setActiveIdx((i) => Math.max(0, i - 1))} disabled={activeIdx === 0}><Icon.ArrowL /></button>
            <button className="nav-btn" aria-label="Next phase" onClick={() => setActiveIdx((i) => Math.min(PHASES.length - 1, i + 1))} disabled={activeIdx === PHASES.length - 1}><Icon.ArrowR /></button>
          </div>

          <SpineStrip activeIdx={activeIdx} count={PHASES.length} />
          <div className="arc-nodes" role="tablist">
            {PHASES.map((p, i) => {
              const Cmp = Icon[p.icon];
              const active = i === activeIdx;
              return (
                <div
                  key={p.id}
                  className={'node' + (active ? ' active' : '')}
                  onClick={() => setActiveIdx(i)}
                  role="tab"
                  aria-selected={active}
                  tabIndex={0}
                  onKeyDown={(e) => {if (e.key === 'Enter' || e.key === ' ') setActiveIdx(i);}}>
                  <div className="node-dot"><Cmp /></div>
                  <div className="node-num">PHASE {p.num}</div>
                  <div className="node-label">{p.label.split('\n').map((l, idx) => <div key={idx}>{l}</div>)}</div>
                </div>);

            })}
          </div>

          <div className="hint" style={{ marginTop: 24 }}>
            select a phase to expand
          </div>
        </div>

        {/* ---------- DETAIL PANEL ---------- */}
        <div className="panel-wrap">
          <div className="panel" key={phase.id} data-screen-label={`Phase ${phase.num}`}>
            <div className="panel-meta">
              <div className="panel-step">PHASE {phase.num} &nbsp;/&nbsp; {PHASES.length.toString().padStart(2, '0')}</div>
              <h2 className="panel-title">{phase.label.replace('\n', ' ')}</h2>
              <p className="panel-lead">{phase.lead}</p>
              <div className="panel-tags">
                {phase.tags.map((tg) => <span className="tag" key={tg}>{tg}</span>)}
              </div>
            </div>

            <div className="col-outcomes">
              <h3 className="col-head">What our clients achieve</h3>
              <div className="outcome-list">
                {phase.outcomes.map((o, i) =>
                <div className="outcome" key={i}>
                    <div className="outcome-marker" />
                    <div>
                      <div className="outcome-headline">{o.h}</div>
                      <div className="outcome-body">{o.b}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="col-proof">
              <h3 className="col-head">Selected proof points</h3>
              <div className="proof-list">
                {phase.proofs.map((pp, i) =>
                <div className="proof" key={i}>
                    <div className="proof-where">{pp.where}</div>
                    <div className="proof-what">{pp.what}</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
